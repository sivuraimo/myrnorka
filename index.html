<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Language"
			content="ru"
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>

		<title>Мурнорка</title>
		<meta
			name="description"
			content="Курашкина О.Б. — Мурнорка"
		/>

		<link
			rel="icon"
			href="./assets/images/favicon.ico"
			type="image/x-icon"
		/>

		<link
			rel="stylesheet"
			href="./styles/styles.css"
		/>
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__wrapper">
					<a
						href="/"
						class="header__logo"
					>
						мурнорка
					</a>
					<nav class="header__nav">
						<ul class="header__nav-list">
							<li class="header__nav-item">
								<a
									href="#"
									class="text-link"
								>
									Шапки
								</a>
							</li>
							<li class="header__nav-item">
								<a
									href="#"
									class="text-link"
								>
									Шубы
								</a>
							</li>
							<li class="header__nav-item">
								<a
									href="/"
									class="text-link is--active"
								>
									Коллекции
								</a>
							</li>
							<li class="header__nav-item">
								<a
									href="#"
									class="text-link"
								>
									Варежки
								</a>
							</li>
							<li class="header__nav-item">
								<a
									href="#"
									class="text-link"
								>
									О нас
								</a>
							</li>
						</ul>
						<button class="text-link">Корзина</button>
					</nav>
				</div>
			</div>
		</header>
		<main class="main">
			<section class="hero">
				<div class="container">
					<h1 class="u-title-m">Женщинам</h1>
					<ul class="hero__collections">
						<li class="hero__collections-item card">
							<a
								href="#"
								class="hero__collections-link"
							>
								<div class="card__content">
									<h2 class="u-title-s">Светлый орех</h2>
									<p class="u-text-accent">45 000 ₽</p>
								</div>
								<div class="card__bg">
									<img
										class="image-cover"
										src="./assets/images/product-01-image.png"
										alt="Светлый орех"
									/>
								</div>
							</a>
						</li>
						<li class="hero__collections-item card">
							<a
								href="#"
								class="hero__collections-link"
							>
								<div class="card__content">
									<h2 class="u-title-s">Полярная ночь</h2>
									<p class="u-text-accent">30 000 ₽</p>
								</div>
								<div class="card__bg">
									<img
										class="image-cover"
										src="./assets/images/product-02-image.png"
										alt="Полярная ночь"
									/>
								</div>
							</a>
						</li>
						<li class="hero__collections-item card">
							<a
								href="#"
								class="hero__collections-link"
							>
								<div class="card__content">
									<h2 class="u-title-s">Каштан</h2>
									<p class="u-text-accent">8000 ₽</p>
								</div>
								<div class="card__bg">
									<img
										class="image-cover"
										src="./assets/images/product-03-image.png"
										alt="Каштан"
									/>
								</div>
							</a>
						</li>
					</ul>
				</div>
			</section>
		</main>
		<footer class="footer">
			<div class="container">
				<div class="footer__wrapper">
					<a
						href="/"
						class="footer__logo"
					>
						<img
							class="image-cover"
							src="./assets/images/footer-logo.svg"
							alt="Мурнорка"
						/>
					</a>
					<nav class="footer__nav">
						<div class="footer__row">
							<div class="footer__sector">
								<a
									class="footer-link"
									href="#"
								>
									Шапки
								</a>
								<a
									class="footer-link"
									href="#"
								>
									Коллекции
								</a>
								<a
									class="footer-link"
									href="#"
								>
									О нас
								</a>
							</div>
							<div class="footer__social">
								<a
									class="footer-link"
									href="#"
								>
									Мы в Telegram
								</a>
							</div>
						</div>
						<div class="footer__row">
							<div class="footer__sector">
								<a
									class="footer-link"
									href="#"
								>
									Шубы
								</a>
								<a
									class="footer-link"
									href="#"
								>
									Варежки
								</a>
							</div>
							<div class="footer__social">
								<a
									class="footer-link"
									href="#"
								>
									Instagram
								</a>
							</div>
						</div>
					</nav>
				</div>
			</div>
		</footer>
	</body>
</html>
